      scale:
        hero: 72
        title: 36
        subtitle: 24
        body: 18
        small: 14
        caption: 12
    card_style:
      border_radius: 24
      gradient_fill:
        angle: 135
        stops:
          - [0, "1A2332", 0.96]
          - [100, "1E2A3C", 0.92]
      border_color: "2A3A4A"
      border_width: 1
      gap: 20
    elevation:
      shadow_sm:
        blur: 4
        offset_y: 2
        color: "000000"
        opacity: 0.12
      shadow_md:
        blur: 12
        offset_y: 8
        color: "000000"
        opacity: 0.20
      shadow_lg:
        blur: 24
        offset_y: 16
        color: "000000"
        opacity: 0.28
    gradients:
      cover_bg:
        angle: 135
        stops:
          - [0, "0F1419"]
          - [40, "141E2A"]
          - [100, "1A2840"]
      accent_bar:
        angle: 90
        stops:
          - [0, "00D4FF"]
          - [100, "8B5CF6"]
      card_highlight:
        angle: 180
        stops:
          - [0, "1A2332"]
          - [100, "1E2A3C"]
      glow:
        angle: 135
        stops:
          - [0, "00D4FF"]
          - [50, "5C7CFA"]
          - [100, "8B5CF6"]
    decoration:
      pattern: grid
      pattern_size: 40
      pattern_opacity: 0.04
      grain:
        dot_radius: 0.5
        spacing: 4
        opacity: 0.06
      glow_spots:
        - cx: "15%"
          cy: "20%"
          r: "40%"
          color: "00D4FF"
          opacity: 0.12
        - cx: "85%"
          cy: "80%"
          r: "35%"
          color: "A78BFA"
          opacity: 0.08
        - cx: "50%"
          cy: "10%"
          r: "25%"
          color: "10B981"
          opacity: 0.05
      curves:
        - d: "M-100,500 C200,200 600,100 1380,300"
          stroke_width: 120
          opacity: 0.06
          gradient: accent_bar
        - d: "M-50,520 C220,220 620,120 1400,320"
          stroke_width: 2
          opacity: 0.15
          gradient: accent_bar
      icon_style: glow
    badge_style:
      bg: "0C1B2E"
      border: "2A3A4A"
      text_color: "00D4FF"
      height: 28
      border_radius: 14
      font_size: 13
    slide_overrides:
      cover:
        background: gradient:cover_bg
        text_color: "E8ECF1"
      section_divider:
        background: "0F1419"
        text_color: "00D4FF"

