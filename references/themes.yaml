# PowerPoint Business Themes
# 10 themes optimized for SVG-native slide generation (1280x720)
# All colors are 6-digit hex WITHOUT # prefix unless noted

themes:
  corporate_blue:
    name: Corporate Blue
    description: Professional navy palette. Trustworthy, authoritative, suitable for investor decks, board reports, and enterprise pitches.
    color_scheme:
      primary: "1E3A5F"
      secondary: "4A7FB5"
      accent: "E8A838"
      background: "FFFFFF"
      card_bg: "F7F9FC"
      text_primary: "1A1A2E"
      text_secondary: "4A5568"
      text_muted: "8896A6"
      chart_colors:
        - "1E3A5F"
        - "4A7FB5"
        - "E8A838"
        - "2ECC71"
        - "E74C3C"
        - "9B59B6"
    typography:
      heading_font: "Helvetica Neue, Arial, PingFang SC, Noto Sans SC, sans-serif"
      body_font: "Helvetica Neue, Arial, PingFang SC, Noto Sans SC, sans-serif"
      cjk_font: "PingFang SC, Noto Sans SC, sans-serif"
      scale:
        hero: 72
        title: 36
        subtitle: 24
        body: 18
        small: 14
        caption: 12
    card_style:
      border_radius: 8
      shadow:
        blur: 6
        offset_y: 2
        color: "1E3A5F"
        opacity: 0.08
      border_color: "E2E8F0"
      border_width: 1
      gap: 20
    gradients:
      cover_bg:
        angle: 135
        stops:
          - [0, "1E3A5F"]
          - [60, "2A5080"]
          - [100, "4A7FB5"]
      accent_bar:
        angle: 90
        stops:
          - [0, "E8A838"]
          - [100, "F0C060"]
      card_highlight:
        angle: 180
        stops:
          - [0, "F7F9FC"]
          - [100, "EDF2F7"]
    decoration:
      pattern: none
      icon_style: outline
    slide_overrides:
      cover:
        background: gradient:cover_bg
        text_color: "FFFFFF"
      section_divider:
        background: "1E3A5F"
        text_color: "FFFFFF"

